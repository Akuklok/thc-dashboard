name: Build TopTenBuyer.ai desktop
on:
  workflow_dispatch: {}
  push:
    paths:
      - 'buyer_client/desktop/**'
      - '.github/workflows/build-desktop.yml'
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: buyer_client/desktop
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: TopTenBuyer-${{ matrix.os }}
          path: |
            buyer_client/desktop/dist/*.exe
            buyer_client/desktop/dist/*.dmg
          if-no-files-found: ignore
