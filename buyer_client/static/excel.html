<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TopTenBuyer.ai for Excel</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  :root{--green:#0F3A4C;--green2:#15728E;--bg:#f5f6f4;--line:#e3e6e2;--muted:#6b756f}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:#1a1f1c;font-size:14px}
  header{background:var(--green);color:#fff;padding:8px 10px;display:flex;align-items:center;gap:8px}
  header b{font-size:14px} header select{margin-left:auto;border:0;border-radius:6px;padding:4px 6px}
  .pad{padding:10px}
  .read{width:100%;background:var(--green2);color:#fff;border:0;padding:9px;border-radius:8px;font-size:13px;margin-bottom:8px;cursor:pointer}
  #msgs{height:calc(100vh - 180px);overflow:auto}
  .msg{padding:8px 10px;border-radius:12px;margin:6px 0;white-space:pre-wrap;line-height:1.4;font-size:13px}
  .me{background:var(--green);color:#fff;margin-left:18px;border-bottom-right-radius:3px}
  .ai{background:#fff;border:1px solid var(--line);margin-right:18px;border-bottom-left-radius:3px}
  .row{display:flex;gap:6px;margin-top:6px}
  .row input{flex:1;padding:9px;border:1px solid var(--line);border-radius:8px}
  .row button{background:var(--green);color:#fff;border:0;padding:0 12px;border-radius:8px;cursor:pointer}
  .muted{color:var(--muted);font-size:12px}
</style>
</head>
<body>
<div class="pad" id="boot"><div class="muted">Loading TopTenBuyer.ai…</div></div>
<div id="app" style="display:none">
  <header><b>TopTenBuyer.ai</b><select id="dept"></select></header>
  <div class="pad">
    <button class="read" id="readBtn">Read my selected cells &amp; ask</button>
    <div id="msgs"></div>
    <div class="row">
      <input id="q" placeholder="Ask anything…"/>
      <button id="send">Send</button>
    </div>
  </div>
</div>
<script>
const ALLDEPTS=["THC","Wine","Spirits","Beer","Other"];
let history=[];
const $=id=>document.getElementById(id);
function bubble(t,c){ const m=document.createElement('div'); m.className='msg '+c; m.textContent=t; $('msgs').appendChild(m); $('msgs').scrollTop=1e9; return m; }
async function send(userText, display){
  bubble(display,'me'); history.push({role:'user',content:userText});
  const t=bubble('Thinking…','ai');
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dept:$('dept').value,messages:history})});
    const d=await r.json(); t.textContent=d.reply; history.push({role:'assistant',content:d.reply});
  }catch(e){ t.textContent='(Error reaching the assistant)'; }
}
function ask(){ const q=$('q').value.trim(); if(!q)return; $('q').value=''; send(q,q); }
async function readAsk(){
  let sel=null;
  try{
    sel=await Excel.run(async ctx=>{ const r=ctx.workbook.getSelectedRange(); r.load('values,address'); await ctx.sync();
      const text=r.values.map(row=>row.map(c=>c==null?'':c).join('\t')).join('\n'); return {address:r.address,text}; });
  }catch(e){ bubble('Select some cells first, then tap the button again.','ai'); return; }
  const typed=$('q').value.trim(); $('q').value='';
  const question=typed||"Here are the cells I'm working on in Excel. What stands out vs our buying data — anything to buy, skip, or fix?";
  send(question+"\n\n[My Excel selection "+sel.address+"]:\n"+sel.text, (typed||'Read my selection')+' ('+sel.address+')');
}
Office.onReady(function(){
  $('boot').style.display='none'; $('app').style.display='block';
  $('dept').innerHTML=ALLDEPTS.map(d=>`<option>${d}</option>`).join('');
  $('send').addEventListener('click',ask);
  $('q').addEventListener('keydown',e=>{ if(e.key==='Enter') ask(); });
  $('readBtn').addEventListener('click',readAsk);
});
</script>
</body>
</html>
